# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/bbs_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
spring.datasource.username=bbsuser
spring.datasource.password=Bbs@123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JSP
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Character Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Static resources (JSP files)
spring.web.resources.static-locations=classpath:/static/,classpath:/public/,classpath:/resources/,classpath:/META-INF/resources/,file:src/main/webapp/

# Session
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true

# Logging
logging.level.com.bbs=DEBUG
logging.level.org.springframework.web=INFO
